#===============================================================================================
#-------------------------------------
#---    Test Suite for Nfs Ganesha vers 4.2---
#-------------------------------------
# Conf: conf/squid/nfs/1admin-7node-3client.yaml
# Smoke test cases for
#    - Bootstrap
#    - Host management
#    - Configure nfs-ganesha on nfs server,do mount on any client and do IOs
#    - Test tier1 scenarios
#
#===============================================================================================
tests:
  - test:
      name: IBM Scale Gerontion tests
      module: upstream_nfs_gerontion.py
      desc: Verify Gerontion suites on nfs ganesha
      abort-on-fail: false
      config:
        nfs_version: 4.2
        clients: 1
        # Per-workload (and per-mount) gerontion run time
        workload_duration_minutes: 30

